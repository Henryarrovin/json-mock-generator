services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama serve & sleep 5 && ollama pull tinyllama && wait"

  app:
    image: henryarrovin/json-mock-generator:latest
    container_name: json-mock-generator
    ports:
      - "8080:8080"
    depends_on:
      ollama:
        condition: service_started
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate
      - OLLAMA_MODEL=tinyllama
    restart: unless-stopped

volumes:
  ollama_data: