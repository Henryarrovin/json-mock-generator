apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          command: ["/bin/sh"]
          args:
            - "-c"
            - |
              set -e
              # Start Ollama server in the background
              ollama serve & 
              sleep 5  # wait for server to be ready
              echo "Pulling tinyllama model..."
              ollama pull tinyllama
              # Bring server process to foreground
              fg
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          emptyDir: {}